version: '3.8'

# This file orchestrates the warehouse graph database and any related services.
# It makes the entire stack portable and robust across different machines/robots.

services:
  db:
    build: .
    container_name: warehouse_routing_db
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-warehouse_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
